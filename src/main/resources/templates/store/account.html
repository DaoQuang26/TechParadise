<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài khoản - TechParadise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" href="/css/main.css">
</head>
<body>
<header class="site-header">
    <div class="container header-inner">
        <a class="logo" href="/">
            <span class="logo-mark">TP</span>
            <span class="logo-text">TechParadise</span>
        </a>

        <div class="header-search">
            <input id="search" class="search-input" placeholder="Bạn cần tìm gì?">
            <button class="btn btn-solid" type="button" onclick="TechStore.searchFromHeader()">
                <span class="icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2"/></svg>
                </span>
                Tìm
            </button>
        </div>

        <nav class="header-actions">
            <a class="action" href="/cart" onclick="return TechStore.goCart(event)">
                <span class="icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 6h15l-2 10H7L6 6Z"/>
                        <path d="M6 6 5 3H2"/>
                        <circle cx="9" cy="20" r="1"/>
                        <circle cx="18" cy="20" r="1"/>
                    </svg>
                </span>
                <span class="action-label">Giỏ hàng</span>
                <span id="cart-badge" class="badge">0</span>
            </a>

            <a id="orders-link" class="action" href="/orders" style="display:none;">
                <span class="icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M8 6h12"/>
                        <path d="M8 12h12"/>
                        <path d="M8 18h12"/>
                        <path d="M4 6h.01"/>
                        <path d="M4 12h.01"/>
                        <path d="M4 18h.01"/>
                    </svg>
                </span>
                <span class="action-label">Đơn hàng</span>
            </a>

            <a id="admin-link" class="action" href="/admin/dashboard" style="display:none;">Quản trị</a>

            <a id="login-link" class="action" href="/login">
                <span class="icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
                </span>
                <span class="action-label" data-login-label>Đăng nhập</span>
            </a>
            <a id="register-link" class="action action-cta" href="/register">Đăng ký</a>
            <button id="logout-btn" class="action action-ghost" type="button" style="display:none;" onclick="TechStore.logout()">Đăng xuất</button>
        </nav>
    </div>
</header>

<main class="container page">
    <div class="page-head" style="display:flex; align-items:flex-end; justify-content:space-between; gap:12px; flex-wrap:wrap;">
        <div>
            <h1 style="margin:0;">Tài khoản</h1>
        </div>
        <a class="btn btn-outline" href="/orders">Đơn hàng của tôi</a>
    </div>

    <section class="grid-2">
        <section class="card">
            <div class="card-head"><h2>Cập nhật thông tin cá nhân</h2></div>
            <div class="card-body">
                <form id="profile-info-form">
                    <div class="admin-form-grid">
                        <div class="form-row">
                            <label class="field-label" for="pf-full-name">Họ và tên</label>
                            <input id="pf-full-name" class="input" autocomplete="name">
                        </div>
                        <div class="form-row">
                            <label class="field-label" for="pf-email">Email</label>
                            <input id="pf-email" class="input" type="email" autocomplete="email">
                        </div>
                    </div>

                    <div class="admin-form-grid">
                        <div class="form-row">
                            <label class="field-label" for="pf-phone">Số điện thoại</label>
                            <input id="pf-phone" class="input" autocomplete="tel">
                        </div>
                        <div class="form-row">
                            <label class="field-label" for="pf-username">Tên đăng nhập</label>
                            <input id="pf-username" class="input" disabled>
                        </div>
                    </div>

                    <div class="admin-form-grid">
                        <div class="form-row">
                            <label class="field-label" for="pf-address">Địa chỉ</label>
                            <textarea id="pf-address" class="textarea" rows="4" autocomplete="street-address"></textarea>
                        </div>
                        <div class="form-row">
                            <label class="field-label" for="pf-created">Ngày tạo</label>
                            <input id="pf-created" class="input" disabled>
                        </div>
                    </div>

                    <div class="admin-form-actions">
                        <button class="btn btn-solid" type="submit" id="pf-info-save">Lưu thông tin</button>
                        <button class="btn btn-outline" type="button" id="pf-info-reset">Khôi phục</button>
                    </div>

                    <div id="pf-info-msg" class="message" style="margin-top:12px; display:none;"></div>
                </form>
            </div>
        </section>

        <section class="card">
            <div class="card-head"><h2>Đổi mật khẩu</h2></div>
            <div class="card-body">
                <form id="profile-password-form">
                    <div class="form-row">
                        <label class="field-label" for="pf-current">Mật khẩu hiện tại</label>
                        <div class="password-wrap">
                            <div class="input-with-icon" style="flex: 1;">
                                <span class="icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M7 11V8a5 5 0 0 1 10 0v3"></path>
                                        <path d="M6 11h12v10H6z"></path>
                                    </svg>
                                </span>
                                <input id="pf-current" class="input" type="password" autocomplete="current-password" required>
                            </div>
                            <button class="btn btn-outline btn-icon" type="button" data-password-target="pf-current" aria-label="Hiển thị mật khẩu hiện tại">
                                <span class="icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12Z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </span>
                            </button>
                        </div>
                    </div>
                    <div class="form-row">
                        <label class="field-label" for="pf-new">Mật khẩu mới</label>
                        <div class="password-wrap">
                            <div class="input-with-icon" style="flex: 1;">
                                <span class="icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M7 11V8a5 5 0 0 1 10 0v3"></path>
                                        <path d="M6 11h12v10H6z"></path>
                                    </svg>
                                </span>
                                <input id="pf-new" class="input" type="password" autocomplete="new-password" minlength="6" required>
                            </div>
                            <button class="btn btn-outline btn-icon" type="button" data-password-target="pf-new" aria-label="Hiển thị mật khẩu mới">
                                <span class="icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12Z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </span>
                            </button>
                        </div>
                    </div>
                    <div class="form-row">
                        <label class="field-label" for="pf-confirm">Xác nhận mật khẩu mới</label>
                        <div class="password-wrap">
                            <div class="input-with-icon" style="flex: 1;">
                                <span class="icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M7 11V8a5 5 0 0 1 10 0v3"></path>
                                        <path d="M6 11h12v10H6z"></path>
                                    </svg>
                                </span>
                                <input id="pf-confirm" class="input" type="password" autocomplete="new-password" minlength="6" required>
                            </div>
                            <button class="btn btn-outline btn-icon" type="button" data-password-target="pf-confirm" aria-label="Hiển thị xác nhận mật khẩu">
                                <span class="icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12Z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </span>
                            </button>
                        </div>
                    </div>

                    <div class="admin-form-actions">
                        <button class="btn btn-solid" type="submit" id="pf-password-save">Đổi mật khẩu</button>
                        <button class="btn btn-outline" type="button" id="pf-password-reset">Xóa form</button>
                    </div>

                    <div id="pf-password-msg" class="message" style="margin-top:12px; display:none;"></div>
                </form>
            </div>
        </section>
    </section>
</main>

<div th:replace="~{fragments/site_footer :: storefrontFooter}"></div>

<script th:src="@{/js/ui.js}" src="/js/ui.js"></script>
<script th:src="@{/js/site.js}" src="/js/site.js"></script>
<script th:src="@{/js/account.js(v='20260419d')}" src="/js/account.js?v=20260419d"></script>
</body>
</html>
