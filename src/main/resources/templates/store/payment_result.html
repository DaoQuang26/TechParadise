<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả thanh toán - TechParadise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" href="/css/main.css">
</head>
<body>
<main class="container page">
    <section class="card" style="max-width: 820px; margin: 30px auto;">
        <!-- tac dung code: trang ket qua trung gian giup user thay ro ket qua payment truoc khi vao chi tiet don. -->
        <div class="card-head">
            <h2 id="payment-result-title" style="margin:0;">Đang xử lý kết quả thanh toán...</h2>
        </div>
        <div class="card-body">
            <p id="payment-result-subtitle" class="muted" style="margin-top:0;">
                Vui lòng chờ trong giây lát.
            </p>
            <div class="kv">
                <span class="muted">Kết quả</span>
                <strong id="payment-result-badge">-</strong>
            </div>
            <div class="kv">
                <span class="muted">Provider</span>
                <strong id="payment-result-provider">-</strong>
            </div>
            <div class="kv">
                <span class="muted">Mã phản hồi cổng</span>
                <strong id="payment-result-code">-</strong>
            </div>
            <div class="kv">
                <span class="muted">Mã đơn hàng</span>
                <strong id="payment-result-order">-</strong>
            </div>

            <div class="admin-form-actions" style="margin-top: 14px;">
                <a id="payment-go-order" class="btn btn-primary" href="/orders">Xem chi tiết đơn</a>
                <a class="btn btn-outline" href="/orders">Danh sách đơn hàng</a>
                <a class="btn btn-outline" href="/">Về trang chủ</a>
            </div>
        </div>
    </section>
</main>

<script th:src="@{/js/ui.js}" src="/js/ui.js"></script>
<script th:src="@{/js/site.js}" src="/js/site.js"></script>
<script th:src="@{/js/payment_result.js}" src="/js/payment_result.js"></script>
</body>
</html>
