<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm - TechParadise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css(v='20260415m')}" href="/css/main.css?v=20260415m">
</head>
<body>
<!-- Global header: logo + search + tài khoản + giỏ hàng (đồng bộ bởi js/site.js) -->
<header class="site-header">
    <div class="container header-inner">
        <a class="logo" href="/">
            <span class="logo-mark">TP</span>
            <span class="logo-text">TechParadise</span>
        </a>

        <div class="header-search">
            <input id="search" class="search-input" placeholder="Bạn cần tìm gì?">
            <button class="btn btn-solid" type="button" onclick="TechStore.searchFromHeader()">
                <span class="icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2"/></svg>
                </span>
                Tìm
            </button>
        </div>

        <nav class="header-actions">
            <a class="action" href="/cart" onclick="return TechStore.goCart(event)">
                <span class="icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 6h15l-2 10H7L6 6Z"/>
                        <path d="M6 6 5 3H2"/>
                        <circle cx="9" cy="20" r="1"/>
                        <circle cx="18" cy="20" r="1"/>
                    </svg>
                </span>
                <span class="action-label">Giỏ hàng</span>
                <span id="cart-badge" class="badge">0</span>
            </a>

            <a id="orders-link" class="action" href="/orders" style="display:none;">
                <span class="icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M8 6h12"/>
                        <path d="M8 12h12"/>
                        <path d="M8 18h12"/>
                        <path d="M4 6h.01"/>
                        <path d="M4 12h.01"/>
                        <path d="M4 18h.01"/>
                    </svg>
                </span>
                <span class="action-label">Đơn hàng</span>
            </a>

            <a id="admin-link" class="action" href="/admin/dashboard" style="display:none;">Quản trị</a>

            <a id="login-link" class="action" href="/login">
                <span class="icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
                </span>
                <span class="action-label" data-login-label>Đăng nhập</span>
            </a>
            <a id="register-link" class="action action-cta" href="/register">Đăng ký</a>
            <button id="logout-btn" class="action action-ghost" type="button" style="display:none;" onclick="TechStore.logout()">Đăng xuất</button>
        </nav>
    </div>
</header>

<main class="container page product-page">
    <div class="page-head" style="display:flex; align-items:flex-end; justify-content:space-between; gap:12px; flex-wrap:wrap;">
        <div>
            <h1 style="margin:0;" id="product-title">Sản phẩm</h1>
        </div>
        <a class="btn btn-outline" href="/">← Quay lại</a>
    </div>

    <section class="product-view" id="product-view">
        <!-- JS sẽ render nội dung/skeleton vào đây -->
    </section>

    <section class="section" style="padding-top: 22px;">
        <div class="section-head">
            <div>
                <h2>Sản phẩm liên quan (cùng danh mục, cùng thương hiệu)</h2>
            </div>
        </div>
        <div class="related-carousel">
            <button id="related-prev" class="related-nav" type="button" aria-label="Sản phẩm trước" style="display:none;">‹</button>
            <div class="related-track-wrap">
                <div id="related-products" class="related-track" aria-live="polite"></div>
            </div>
            <button id="related-next" class="related-nav" type="button" aria-label="Sản phẩm tiếp theo" style="display:none;">›</button>
        </div>
    </section>
</main>

<div th:replace="~{fragments/site_footer :: storefrontFooter}"></div>

<script th:src="@{/js/ui.js(v='20260408d')}" src="/js/ui.js?v=20260408d"></script>
<script th:src="@{/js/site.js(v='20260415m')}" src="/js/site.js?v=20260415m"></script>
<script th:src="@{/js/product.js(v='20260419d')}" src="/js/product.js?v=20260419d"></script>
</body>
</html>
