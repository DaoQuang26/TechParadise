<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - TechParadise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" href="/css/main.css">
</head>
<body>
<!-- Global header: logo + search + tài khoản + giỏ hàng (đồng bộ bởi js/site.js) -->
<header class="site-header">
    <div class="container header-inner">
        <!-- Logo (đi về trang chủ) -->
        <a class="logo" href="/">
            <span class="logo-mark">TP</span>
            <span class="logo-text">TechParadise</span>
        </a>

        <!-- Search box: nhập từ khóa và chuyển về /?keyword=... -->
        <div class="header-search">
            <input id="search" class="search-input" placeholder="Bạn cần tìm gì?">
            <button class="btn btn-solid" type="button" onclick="TechStore.searchFromHeader()">
                <span class="icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2"/></svg>
                </span>
                Tìm
            </button>
        </div>

        <!-- Actions: giỏ hàng + admin link (nếu có quyền) + auth links -->
        <nav class="header-actions">
            <a class="action" href="/cart" onclick="return TechStore.goCart(event)">
                <span class="icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 6h15l-2 10H7L6 6Z"/>
                        <path d="M6 6 5 3H2"/>
                        <circle cx="9" cy="20" r="1"/>
                        <circle cx="18" cy="20" r="1"/>
                    </svg>
                </span>
                <span class="action-label">Giỏ hàng</span>
                <span id="cart-badge" class="badge">0</span>
            </a>

            <a id="orders-link" class="action" href="/orders" style="display:none;">
                <span class="icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M8 6h12"/>
                        <path d="M8 12h12"/>
                        <path d="M8 18h12"/>
                        <path d="M4 6h.01"/>
                        <path d="M4 12h.01"/>
                        <path d="M4 18h.01"/>
                    </svg>
                </span>
                <span class="action-label">Đơn hàng</span>
            </a>

            <a id="admin-link" class="action" href="/admin/dashboard" style="display:none;">Quản trị</a>

            <a id="login-link" class="action" href="/login">
                <span class="icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
                </span>
                <span class="action-label" data-login-label>Đăng nhập</span>
            </a>
            <a id="register-link" class="action action-cta" href="/register">Đăng ký</a>
            <button id="logout-btn" class="action action-ghost" type="button" style="display:none;" onclick="TechStore.logout()">Đăng xuất</button>
        </nav>
    </div>
</header>

<main class="container page">
    <!-- Tiêu đề trang -->
    <div class="page-head">
        <h1>Giỏ hàng</h1>
    </div>

    <!-- Empty-state: cart rỗng -->
    <section id="cart-empty" class="empty-state" style="display:none;">
        <div class="empty-card">
            <h2>Giỏ hàng đang trống</h2>
            <a class="btn btn-solid" href="/">Tiếp tục mua sắm</a>
        </div>
    </section>

    <!-- Nội dung cart: bảng item + tóm tắt -->
    <section id="cart-content" class="grid-2" style="display:none;">
        <div class="card">
            <div class="card-head">
                <h2>Sản phẩm</h2>
            </div>
            <div class="card-body">
                <div class="table-wrap">
                    <table class="table" aria-label="Giỏ hàng">
                        <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th class="col-right">Đơn giá</th>
                            <th class="col-center">Số lượng</th>
                            <th class="col-right">Tạm tính</th>
                            <th class="col-center">Xóa</th>
                        </tr>
                        </thead>
                        <tbody id="cart-rows"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <aside class="card summary">
            <div class="card-head">
                <h2>Tóm tắt</h2>
            </div>
            <div class="card-body">
                <div class="kv">
                    <span class="muted">Tạm tính</span>
                    <strong id="cart-subtotal">0 đ</strong>
                </div>
                <div class="kv total">
                    <span>Tổng cộng</span>
                    <strong id="cart-total">0 đ</strong>
                </div>
                <button class="btn btn-solid btn-block" type="button" onclick="TechStore.goCheckoutFromCart()">Thanh toán</button>
                <a class="btn btn-outline btn-block" href="/">Tiếp tục mua sắm</a>
            </div>
        </aside>
    </section>
</main>

<div th:replace="~{fragments/site_footer :: storefrontFooter}"></div>

<!-- JS dùng chung: session + giỏ + header -->
<script th:src="@{/js/ui.js}" src="/js/ui.js"></script>
<script th:src="@{/js/site.js}" src="/js/site.js"></script>
<!-- JS trang giỏ hàng: render + xử lý tăng/giảm/xóa item -->
<script th:src="@{/js/cart.js}" src="/js/cart.js"></script>
</body>
</html>
