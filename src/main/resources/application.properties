# Database config: read from environment in production to avoid hard-coded secrets in source.
spring.config.import=optional:file:./config/application-local.properties,optional:classpath:application-local.properties
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/techstore?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${DB_USERNAME:root}
# Keep local default password for your current machine, but still allow env override in production.
spring.datasource.password=${DB_PASSWORD:261024}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}
# Do not leak internal exception messages to clients on default error responses.
server.error.include-message=never
# Allow changing port quickly if 8080 is already in use.
server.port=${SERVER_PORT:8080}

# Force UTF-8 for Vietnamese content (HTML/JSON) to prevent broken accents in the browser.
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.thymeleaf.encoding=UTF-8

# Cấu hình upload ảnh sản phẩm từ form quản trị.
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT settings (secret should be a long random value from env/secret manager).
jwt.secret=${JWT_SECRET:change-this-jwt-secret-in-env}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}
# Cookie used for server-side route protection (admin/cart/checkout HTML routes).
app.auth.cookie-name=${AUTH_COOKIE_NAME:TS_ACCESS_TOKEN}
app.auth.cookie-secure=${AUTH_COOKIE_SECURE:false}
# Forgot-password settings (keep expose-token=false in production to avoid leaking reset token in API response).
app.auth.reset-token.expiry-minutes=${RESET_TOKEN_EXPIRY_MINUTES:30}
app.auth.forgot-password.expose-token=${FORGOT_PASSWORD_EXPOSE_TOKEN:false}
# Login hardening: lock account temporarily after too many failed attempts.
app.auth.login.max-failed-attempts=${AUTH_LOGIN_MAX_FAILED_ATTEMPTS:5}
app.auth.login.lock-minutes=${AUTH_LOGIN_LOCK_MINUTES:15}
# Online reservation: hold stock for online payment orders in a limited time window.
app.order.online-reservation-minutes=${ORDER_ONLINE_RESERVATION_MINUTES:20}
app.order.reservation-expire-check-ms=${ORDER_RESERVATION_EXPIRE_CHECK_MS:60000}
app.order.reservation-expire-check-initial-ms=${ORDER_RESERVATION_EXPIRE_INITIAL_MS:15000}

# Email notifications (set app.mail.enabled=true + SMTP settings to send real emails).
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:no-reply@techparadise.local}
app.mail.order.notify-admin=${APP_MAIL_NOTIFY_ADMIN:}
# Local/test helper: when set, forgot-password token emails are sent to this address.
app.mail.forgot-password.test-to=${APP_MAIL_FORGOT_TEST_TO:}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

app.super-admin.username=superadmin
app.super-admin.email=superadmin@techstore.local
app.super-admin.password=${SUPER_ADMIN_PASSWORD:SuperAdmin@123}

app.admin.username=admin
app.admin.email=admin@techstore.local
app.admin.password=${ADMIN_PASSWORD:Admin@123}

# Seed products on startup: top-up each category to this minimum count.
app.seed.products.enabled=${APP_SEED_PRODUCTS_ENABLED:true}
app.seed.products-per-category=${APP_SEED_PRODUCTS_PER_CATEGORY:50}
app.seed.customers.enabled=${APP_SEED_CUSTOMERS_ENABLED:true}
app.seed.customers.count=${APP_SEED_CUSTOMERS_COUNT:12}
app.seed.customers.password=${APP_SEED_CUSTOMERS_PASSWORD:123456}
app.seed.orders.enabled=${APP_SEED_ORDERS_ENABLED:true}
app.seed.orders.count=${APP_SEED_ORDERS_COUNT:240}
app.seed.orders.days-back=${APP_SEED_ORDERS_DAYS_BACK:120}
app.seed.orders.days-forward=${APP_SEED_ORDERS_DAYS_FORWARD:45}
# Keep seeded order volume stable between restarts (no perpetual growth).
app.seed.orders.extra-per-run=${APP_SEED_ORDERS_EXTRA_PER_RUN:0}
app.dashboard.revenue.days-forward=${APP_DASHBOARD_REVENUE_DAYS_FORWARD:30}

